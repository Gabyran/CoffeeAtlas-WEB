<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="bg" x1="50" y1="20" x2="150" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F4E3"/><stop offset="1" stop-color="#E6D6BF"/>
    </linearGradient>
    <linearGradient id="stem" x1="90" y1="80" x2="110" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A5936B"/><stop offset="1" stop-color="#87714B"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="96" fill="url(#bg)" stroke="#5E4730" stroke-width="1.2"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="#D6C9AE" stroke-width=".5"/>
  <!-- dandelion stem -->
  <path d="M100 160 Q98 130 100 95" stroke="url(#stem)" stroke-width="2" stroke-linecap="round"/>
  <!-- dandelion head (seed ball) -->
  <circle cx="100" cy="88" r="12" fill="#E6D6BF" stroke="#A5936B" stroke-width=".5"/>
  <!-- remaining seeds on head -->
  <path d="M100 76 L100 68" stroke="#8F583A" stroke-width=".5" stroke-linecap="round"/>
  <path d="M106 78 L110 71" stroke="#8F583A" stroke-width=".5" stroke-linecap="round"/>
  <path d="M94 78 L90 71" stroke="#8F583A" stroke-width=".5" stroke-linecap="round"/>
  <path d="M108 84 L116 80" stroke="#8F583A" stroke-width=".5" stroke-linecap="round"/>
  <!-- flying seeds (the spreading) -->
  <g opacity=".85">
    <!-- seed 1 - top right -->
    <path d="M130 55 L128 48" stroke="#8F583A" stroke-width=".5" stroke-linecap="round"/>
    <path d="M128 48 L125 43 M128 48 L131 43 M128 48 L128 42 M128 48 L124 45 M128 48 L132 45" stroke="#A5936B" stroke-width=".35" stroke-linecap="round"/>
    <!-- seed 2 - far right -->
    <path d="M152 70 L149 63" stroke="#8F583A" stroke-width=".5" stroke-linecap="round"/>
    <path d="M149 63 L146 58 M149 63 L152 58 M149 63 L149 57 M149 63 L145 60 M149 63 L153 60" stroke="#A5936B" stroke-width=".35" stroke-linecap="round"/>
    <!-- seed 3 - top -->
    <path d="M115 38 L113 31" stroke="#8F583A" stroke-width=".5" stroke-linecap="round"/>
    <path d="M113 31 L110 26 M113 31 L116 26 M113 31 L113 25 M113 31 L109 28 M113 31 L117 28" stroke="#A5936B" stroke-width=".35" stroke-linecap="round"/>
    <!-- seed 4 - upper left -->
    <path d="M72 48 L70 41" stroke="#8F583A" stroke-width=".5" stroke-linecap="round"/>
    <path d="M70 41 L67 36 M70 41 L73 36 M70 41 L70 35 M70 41 L66 38 M70 41 L74 38" stroke="#A5936B" stroke-width=".35" stroke-linecap="round"/>
    <!-- seed 5 - right mid -->
    <path d="M145 95 L142 88" stroke="#8F583A" stroke-width=".5" stroke-linecap="round"/>
    <path d="M142 88 L139 83 M142 88 L145 83 M142 88 L142 82 M142 88 L138 85 M142 88 L146 85" stroke="#A5936B" stroke-width=".35" stroke-linecap="round"/>
    <!-- seed 6 - far upper -->
    <path d="M88 32 L86 25" stroke="#8F583A" stroke-width=".5" stroke-linecap="round"/>
    <path d="M86 25 L83 20 M86 25 L89 20 M86 25 L86 19 M86 25 L82 22 M86 25 L90 22" stroke="#A5936B" stroke-width=".35" stroke-linecap="round"/>
  </g>
  <!-- wind lines -->
  <path d="M108 82 Q125 75 140 72" stroke="#D6C9AE" stroke-width=".4" stroke-linecap="round"/>
  <path d="M112 78 Q128 68 148 65" stroke="#D6C9AE" stroke-width=".3" stroke-linecap="round"/>
  <path d="M105 86 Q118 82 135 82" stroke="#D6C9AE" stroke-width=".3" stroke-linecap="round"/>
  <!-- small leaf on stem -->
  <path d="M100 135 Q108 128 112 132 Q108 136 100 135Z" fill="#A5936B" stroke="#5E4730" stroke-width=".4"/>
  <!-- ring decorations -->
  <circle cx="100" cy="8" r="2.5" fill="#A5936B"/><circle cx="100" cy="192" r="2.5" fill="#A5936B"/>
  <circle cx="8" cy="100" r="2.5" fill="#A5936B"/><circle cx="192" cy="100" r="2.5" fill="#A5936B"/>
  <circle cx="35" cy="35" r="1.8" fill="#D6C9AE"/><circle cx="165" cy="35" r="1.8" fill="#D6C9AE"/>
  <circle cx="35" cy="165" r="1.8" fill="#D6C9AE"/><circle cx="165" cy="165" r="1.8" fill="#D6C9AE"/>
</svg>